<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LibryConnect | Create Account</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
    margin:0;
    font-family: 'Georgia', serif;
    background: #fdf6e3 url('https://images.unsplash.com/photo-1512820790803-83ca734da794') no-repeat center/cover;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.register-box {
    background: rgba(255,250,240,0.95);
    padding:40px;
    width:350px;
    border-radius:10px;
    box-shadow:0 5px 20px rgba(0,0,0,0.2);
    text-align:center;
}
h2{margin-top:0;}
input{width:100%;padding:10px;margin:10px 0;border-radius:5px;border:1px solid #ccc;}
button{width:100%;padding:12px;background:#c59d5f;border:none;color:white;font-size:16px;border-radius:5px;cursor:pointer;font-weight:bold;}
button:hover{background:#b07f3f;}
p{margin-top:15px;}
a{color:#6b4226;text-decoration:none;font-weight:bold;}
</style>
</head>
<body>

<div class="register-box">
<h2>Create Account</h2>
<form onsubmit="return createAccount()">
<input type="text" id="newID" placeholder="Student ID / Email" required>
<input type="password" id="newPW" placeholder="Password" required>
<button type="submit">Register</button>
</form>
<p>Already have an account? <a href="librylogin.html">Login</a></p>
</div>

<script>
function createAccount(){
    const id=document.getElementById('newID').value;
    const pw=document.getElementById('newPW').value;
    if(!id || !pw){ alert('Fill all fields'); return false;}
    localStorage.setItem('libryID',id);
    localStorage.setItem('libryPW',pw);
    alert('Account created! Please login.');
    window.location.href='librylogin.html';
    return false;
}
</script>
</body>
</html>
